services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8010:80"
    volumes:
      - ./backend:/var/www/html
    environment:
      - DB_HOST=db
      - DB_NAME=madredeus_db
      - DB_USER=root
      - DB_PASS=secret
    depends_on:
      - db

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=secret
      - MYSQL_DATABASE=madredeus_db
    ports:
      - "3310:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Se mapea la estructura de la base de datos (vacía)
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/01_init.sql

  adminer:
    image: adminer
    restart: always
    ports:
      - "8011:8080"

volumes:
  db_data:
